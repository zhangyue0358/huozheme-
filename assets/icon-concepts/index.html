<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>活着吗 App 图标概念</title>
    <style>
      body {
        margin: 0;
        background: #10120f;
        color: #f2f0e9;
        font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Noto Sans CJK SC", sans-serif;
      }
      main {
        max-width: 1120px;
        margin: 0 auto;
        padding: 36px 20px 56px;
      }
      h1 {
        font-size: 28px;
        margin: 0 0 8px;
      }
      p {
        color: #aaa59a;
        margin: 0 0 24px;
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 22px;
      }
      .card {
        border: 1px solid rgba(155, 226, 124, 0.2);
        border-radius: 24px;
        background: #191b17;
        padding: 16px;
      }
      img {
        display: block;
        width: 100%;
        border-radius: 22%;
      }
      h2 {
        font-size: 16px;
        margin: 14px 0 4px;
      }
      .note {
        color: #8f8b82;
        font-size: 13px;
        line-height: 1.5;
        margin: 0;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>活着吗 App 图标概念</h1>
      <p>先看方向，不是最终精修版。</p>
      <section class="grid">
        <article class="card"><img src="./a-alive-seal.svg" alt="A 活字印章" /><h2>A 活字印章</h2><p class="note">最直接，适合中文品牌记忆。</p></article>
        <article class="card"><img src="./b-daily-check.svg" alt="B 今日确认" /><h2>B 今日确认</h2><p class="note">偏打卡，表达每天确认还在。</p></article>
        <article class="card"><img src="./c-life-switch.svg" alt="C 还在开关" /><h2>C 还在开关</h2><p class="note">有趣一点，像把今天切到“还在”。</p></article>
        <article class="card"><img src="./d-today-archive.svg" alt="D 今日存档" /><h2>D 今日存档</h2><p class="note">贴近日记、打卡日历、存档。</p></article>
        <article class="card"><img src="./e-friend-signal.svg" alt="E 好友信号" /><h2>E 好友信号</h2><p class="note">突出好友戳一下和回应。</p></article>
        <article class="card"><img src="./f-small-proof.svg" alt="F 今天在" /><h2>F 今天在</h2><p class="note">更轻柔，像给今天留个小证明。</p></article>
      </section>
    </main>
  </body>
</html>
