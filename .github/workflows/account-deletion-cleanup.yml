name: Account deletion cleanup

on:
  schedule:
    # Runs daily at 02:20 Asia/Shanghai.
    - cron: '20 18 * * *'
  workflow_dispatch:

jobs:
  cleanup:
    name: Process account deletion retention
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run deletion retention job
        run: npm run admin:process-account-deletion
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
